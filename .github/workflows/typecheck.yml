name: Type Check

# Static type-check gate: mypy + pyright must both stay at 0 errors.
# This reproduces the project's canonical dev environment (a Python 3.13 .venv
# with the full runtime deps + pandas-stubs) in which both checkers are clean.
# See scripts/typecheck.py and the [tool.mypy] config in pyproject.toml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      # TA-Lib ships a C library its Python wheel links against; without it
      # `import talib` fails and pyright reports reportMissingImports across the
      # indicator stack. Install the C library before the pip step.
      - name: Install TA-Lib C library
        run: |
          curl -sSL https://github.com/ta-lib/ta-lib/releases/download/v0.6.4/ta-lib_0.6.4_amd64.deb -o ta-lib.deb
          sudo dpkg -i ta-lib.deb

      # pyrightconfig.json points at `.venv`, and the mypy=0 / pyright=0 results
      # were verified in exactly such a venv. Recreate it here so both checkers
      # analyse the same interpreter and installed packages as local dev.
      - name: Create .venv and install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          # CPU-only torch keeps the install light; the CUDA build is unnecessary
          # for static analysis.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt

      - name: Run type-check gate (mypy + pyright)
        run: .venv/bin/python scripts/typecheck.py
