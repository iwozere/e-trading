$schema: "http://json-schema.org/draft-07/schema#"
title: TradingBotManifest
type: object
required: ["bot_id", "symbol", "broker", "strategy"]
properties:
  bot_id:
    type: string
    description: "Unique identifier for this bot instance"
  symbol:
    type: string
    description: "Trading symbol"
  description:
    type: string
    description: "Human-readable description of what this bot does"
  broker:
    type: object
    required: ["type", "trading_mode"]
    properties:
      type:
        type: string
      trading_mode:
        type: string
        enum: ["paper", "live"]
    additionalProperties: true
  strategy:
    type: object
    required: ["type"]
    properties:
      type:
        type: string
      parameters:
        type: object
    additionalProperties: true
  data:
    type: object
  risk_management:
    type: object
  notifications:
    type: object
  trading:
    type: object
additionalProperties: true
