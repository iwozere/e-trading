# ─── Sources ──────────────────────────────────────────────────────────────────

[sources.journald]
type = "journald"

[sources.docker]
type = "docker_logs"

# ─── Normalize ────────────────────────────────────────────────────────────────
# Unify field names from journald and docker into source_type, source_name, message.

[transforms.normalize]
type = "remap"
inputs = ["journald", "docker"]
source = '''
  if exists(.container_name) {
    .source_type = "docker"
    .source_name = string(.container_name) ?? "unknown"
  } else {
    .source_type = "systemd"
    .source_name = string(._SYSTEMD_UNIT) ?? string(.SYSLOG_IDENTIFIER) ?? "unknown"
  }
  .message = string(.MESSAGE) ?? string!(.message)
  . = {
    "source_type": .source_type,
    "source_name": .source_name,
    "message": .message,
  }
'''

# ─── Parse log level ──────────────────────────────────────────────────────────
# Extracts semantic log level into .parsed_level.
# Supports three formats used in this stack:
#   Python app:   "YYYY-MM-DD HH:MM:SS,ms - [PID n] - LEVEL - message"
#   Docker logfmt: level=error  /  level="error"
#   ISO-Z prefix:  "...nZ  ERROR ..."  (Vector/Rust/Cloudflare ERR)
# Unrecognised lines get UNKNOWN — treated conservatively, never silently dropped.
#
# NOTE: VRL requires "} else if" on the same line — no newline between } and else.

[transforms.parse_level]
type = "remap"
inputs = ["normalize"]
source = '''
  msg = string!(.message)
  .parsed_level = "UNKNOWN"

  if match(msg, r'\] - DEBUG -') { .parsed_level = "DEBUG"
  } else if match(msg, r'\] - INFO -') { .parsed_level = "INFO"
  } else if match(msg, r'\] - WARNING -') { .parsed_level = "WARNING"
  } else if match(msg, r'\] - ERROR -') { .parsed_level = "ERROR"
  } else if match(msg, r'\] - CRITICAL -') { .parsed_level = "CRITICAL"
  } else if match(msg, r'level="?debug') { .parsed_level = "DEBUG"
  } else if match(msg, r'level="?info') { .parsed_level = "INFO"
  } else if match(msg, r'level="?warn') { .parsed_level = "WARNING"
  } else if match(msg, r'level="?error') { .parsed_level = "ERROR"
  } else if match(msg, r'level="?critical') { .parsed_level = "CRITICAL"
  } else if match(msg, r'\dZ\s+DEBUG\b') { .parsed_level = "DEBUG"
  } else if match(msg, r'\dZ\s+INFO\b') { .parsed_level = "INFO"
  } else if match(msg, r'\dZ\s+WARN\b') { .parsed_level = "WARNING"
  } else if match(msg, r'\dZ\s+ERROR\b') { .parsed_level = "ERROR"
  } else if match(msg, r'\dZ\s+CRITICAL\b') { .parsed_level = "CRITICAL"
  } else if match(msg, r'\dZ ERR ') { .parsed_level = "ERROR"
  }
'''

# ─── Level gate ───────────────────────────────────────────────────────────────
# Drop DEBUG and INFO unconditionally regardless of message content.
# WARNING, ERROR, CRITICAL, UNKNOWN all pass through.
# NOTE: VRL string literals use double quotes; single-quoted 'x' is only for r'regex'.

[transforms.level_gate]
type = "filter"
inputs = ["parse_level"]
condition = '.parsed_level != "DEBUG" && .parsed_level != "INFO"'

# ─── Content gate ─────────────────────────────────────────────────────────────
# For UNKNOWN-level lines, require an error keyword so unrecognised formats
# don't generate noise from non-error messages.

[transforms.errors_only]
type = "filter"
inputs = ["level_gate"]
condition = ".parsed_level != \"UNKNOWN\" || match(string!(.message), r'(?i)(error|exception|critical|traceback|fatal)')"

# ─── Per-source noise exclusions ──────────────────────────────────────────────
# Each transform targets one specific known-noisy pattern.
# Add new ones here; keep each focused so the reason is self-evident.

# Cloudflare tunnel QUIC reconnects — normal transient network events, auto-recover
[transforms.exclude_cloudflare]
type = "filter"
inputs = ["errors_only"]
condition = "!(match(string!(.source_name), r'cloudflared') && match(string!(.message), r'no recent network activity|failed to accept QUIC stream|failed to serve tunnel connection|accept stream listener'))"

# IB Gateway log4j shutdown race — always fires when the container stops cleanly
# "it may be disabled" is a partial log4j informational fragment that leaks through UNKNOWN filter
[transforms.exclude_ib_shutdown]
type = "filter"
inputs = ["exclude_cloudflare"]
condition = "!match(string!(.message), r'non-started appender|it may be disabled')"

# General OS / X11 / infra patterns that level parsing cannot suppress
# Cache fallback warning: system recovers automatically, mount absence is tracked separately
[transforms.exclude_infra_noise]
type = "filter"
inputs = ["exclude_ib_shutdown"]
condition = "!match(string!(.message), r'(?i)(apport|ConditionPath|unmet condition|TzCache|py-yfinance|Xlib|XSERVTrans|xkbcomp|XF86|keysym|separator are deprecated|Primary cache dir.*unavailable.*Falling back)')"

# IB Gateway API port 7497 connection refused — expected during nightly IB restart window
[transforms.exclude_ib_reconnect]
type = "filter"
inputs = ["exclude_infra_noise"]
condition = "!match(string!(.message), r'ConnectionRefusedError.*127\.0\.0\.1.*7497')"

# Docker internal DNS resolver transient timeouts — single retries auto-recover
[transforms.exclude_docker_dns]
type = "filter"
inputs = ["exclude_ib_reconnect"]
condition = "!(match(string!(.source_name), r'^docker\.service$') && match(string!(.message), r'failed to query external DNS server.*i/o timeout'))"

# ─── Fingerprint ──────────────────────────────────────────────────────────────
# Build a stable dedup key by stripping timestamps, UUIDs, and numbers.

[transforms.fingerprint]
type = "remap"
inputs = ["exclude_docker_dns"]
source = '''
  fp = replace(string!(.message), r'[0-9]{4}-[0-9]{2}-[0-9]{2}[T ][0-9]{2}:[0-9]{2}:[0-9]{2}[^ ]*', "<TS>")
  fp = replace(fp, r'[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}', "<UUID>")
  fp = replace(fp, r'[0-9]+', "<N>")
  .dedup_key = string!(.source_name) + "|" + (slice(fp, 0, 180) ?? fp)
'''

# ─── Cooldown ─────────────────────────────────────────────────────────────────
# At most one alert per unique error fingerprint per 30 minutes.

[transforms.cooldown]
type = "throttle"
inputs = ["fingerprint"]
threshold = 1
window_secs = 1800
key_field = "dedup_key"

# ─── Final shape ──────────────────────────────────────────────────────────────

[transforms.final_shape]
type = "remap"
inputs = ["cooldown"]
source = '''
  . = {
    "text": "[" + string!(.source_type) + "/" + string!(.source_name) + "] " + string!(.message),
    "source": string!(.source_name),
  }
'''

# ─── Sink ─────────────────────────────────────────────────────────────────────

[sinks.notify]
type = "http"
inputs = ["final_shape"]
uri = "http://127.0.0.1:5003/internal/log-alert"
method = "post"
encoding.codec = "json"
framing.method = "newline_delimited"

[sinks.notify.batch]
max_events = 1

[sinks.notify.request]
retry_attempts = 5
retry_initial_backoff_secs = 1
retry_max_duration_secs = 30

[sinks.notify.request.headers]
X-Internal-Token = "${INTERNAL_API_TOKEN}"
