# Portfolio PnL Alert - Pipeline configuration.

# Notify when current price is at least this fraction above the average buy price.
# 0.10 means +10%.
threshold_pct: 0.10

# Channels to notify (any subset of: telegram, email).
channels:
  - telegram
  - email

# Cron expression for scheduled execution (UTC).
# Default: 21:30 UTC on weekdays (~ US cash close).
cron: "30 21 * * 1-5"

# Path (relative to project root) to the user-editable watchlist YAML.
# Set to an empty string ("") to skip watchlist loading when ibkr_xml_path is used instead.
watchlist_path: src/portfolio/pnl_alert/config/watchlist.yaml

# Path to an IBKR Flex Query "Open Positions" XML export.
# Supports glob patterns — the lexicographically-last match is used,
# so ISO-date filenames (Open_Positions-YYYY-MM-DD.xml) resolve to the newest file.
# Use the fixed-name export for simplicity, or a glob to auto-pick the latest dated file.
# Examples:
#   ibkr_xml_path: src/portfolio/pnl_alert/config/Open_Positions.xml
#   ibkr_xml_path: src/portfolio/pnl_alert/config/Open_Positions-*.xml
# Leave empty to disable.
ibkr_xml_path: src/portfolio/pnl_alert/config/Open_Positions.xml

# User ID whose email address and Telegram chat ID will receive the alert.
recipient_id: 2

# Whether to connect to IBKR and merge live positions into the alert.
# Set to false if you only want to monitor the YAML watchlist.
include_ibkr: true

# Restrict IBKR positions to stock (STK) sec-types only. Options / FX
# positions are filtered out.
ibkr_stk_only: true
