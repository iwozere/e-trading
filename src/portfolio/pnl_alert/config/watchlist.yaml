# Portfolio PnL Alert - User watchlist.
#
# Add positions held outside IBKR, or manually tracked entries, here.
# Each entry needs a symbol and your average buy price in USD.
#
# If a symbol also exists in IBKR, the IBKR average cost wins and a
# warning is logged.
#
# Symbols are passed to Yahoo Finance (via the shared DataManager). For
# non-US listings use the Yahoo exchange suffix, e.g. VUSD.L for the
# London-listed Vanguard ETF. Symbols that cannot be priced are simply
# skipped with a WARNING (they do not fail the whole run).

entries:
  - symbol: VUSD.L
    avg_price: 124.93
    notes: "long-term hold (Vanguard S&P 500 UCITS ETF, LSE USD line)"
  - symbol: VT
    avg_price: 112.6
    notes: "long-term hold"
  # `U` (Unity Software, NYSE) occasionally 404s on Yahoo due to single-
  # letter ticker routing; it usually resolves on the next run.
